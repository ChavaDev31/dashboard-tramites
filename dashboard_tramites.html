<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Operativo | Del Toro Asesores</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-base: #0a0e1a;
    --bg-card: #111827;
    --bg-card2: #141d2e;
    --border: #1e2d45;
    --border-glow: #1e40af;
    --blue: #3b82f6;
    --blue-bright: #60a5fa;
    --blue-pale: #1e3a5f;
    --cyan: #06b6d4;
    --cyan-pale: #0e4a5a;
    --green: #10b981;
    --green-pale: #064e3b;
    --amber: #f59e0b;
    --amber-pale: #451a03;
    --red: #ef4444;
    --red-bright: #f87171;
    --red-pale: #450a0a;
    --purple: #8b5cf6;
    --purple-pale: #2e1065;
    --gray: #4b5563;
    --gray-light: #9ca3af;
    --white: #f1f5f9;
    --white-dim: #64748b;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--white); min-height: 100vh; padding: 1.5rem; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.75rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--blue), var(--cyan), var(--purple)); }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon { width: 44px; height: 44px; background: var(--blue-pale); border: 1px solid var(--blue); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-icon svg { width: 22px; height: 22px; stroke: var(--blue-bright); fill: none; stroke-width: 1.8; }
  .header-title { color: var(--white); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .header-sub { color: var(--white-dim); font-size: 11px; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .badge-live { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--green); font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
  .dot-live { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 6px var(--green); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .btn { background: var(--blue-pale); border: 1px solid var(--blue); color: var(--blue-bright); border-radius: var(--radius-sm); padding: 6px 14px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .btn:hover { background: var(--blue); color: var(--white); box-shadow: 0 0 12px rgba(59,130,246,0.4); }

  /* ESTADOS */
  #loading { text-align: center; padding: 4rem; color: var(--white-dim); font-size: 14px; }
  #error-box { text-align: center; padding: 3rem; color: var(--red); display: none; background: var(--red-pale); border: 1px solid var(--red); border-radius: var(--radius-lg); margin-bottom: 1rem; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #main { display: none; }

  /* UPDATE INFO */
  .update-info { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: var(--green); font-size: 11px; padding: 6px 14px; border-radius: var(--radius-sm); margin-bottom: 1.25rem; text-align: center; }

  /* MÉTRICAS */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
  .metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.1rem; position: relative; overflow: hidden; transition: border-color 0.2s; }
  .metric-card:hover { border-color: var(--border-glow); }
  .metric-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; border-radius: 0 0 var(--radius-md) var(--radius-md); }
  .metric-card.mc-blue::after { background: var(--blue); }
  .metric-card.mc-green::after { background: var(--green); }
  .metric-card.mc-amber::after { background: var(--amber); }
  .metric-card.mc-red::after { background: var(--red); }
  .metric-card.mc-cyan::after { background: var(--cyan); }
  .metric-card.mc-purple::after { background: var(--purple); }
  .metric-label { font-size: 10px; font-weight: 600; color: var(--white-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .metric-val { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; letter-spacing: -0.02em; }
  .metric-hint { font-size: 11px; color: var(--white-dim); }
  .mc-blue .metric-val { color: var(--blue-bright); }
  .mc-green .metric-val { color: var(--green); }
  .mc-amber .metric-val { color: var(--amber); }
  .mc-red .metric-val { color: var(--red-bright); }
  .mc-cyan .metric-val { color: var(--cyan); }
  .mc-purple .metric-val { color: var(--purple); }

  /* BLOQUE MÉDICO */
  .medico-section { background: linear-gradient(135deg, rgba(239,68,68,0.08) 0%, rgba(139,92,246,0.05) 100%); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; display: none; }
  .medico-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .medico-icon { width: 30px; height: 30px; background: var(--red-pale); border: 1px solid var(--red); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .medico-icon svg { width: 15px; height: 15px; stroke: var(--red-bright); fill: none; stroke-width: 2; }
  .medico-titulo { font-size: 13px; font-weight: 600; color: var(--red-bright); }
  .medico-sub { font-size: 11px; color: rgba(239,68,68,0.6); margin-top: 1px; }
  .medico-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .medico-card { background: rgba(10,14,26,0.6); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-md); padding: .85rem 1rem; display: flex; flex-direction: column; gap: 8px; }
  .medico-nombre { font-size: 13px; font-weight: 500; color: var(--white); line-height: 1.4; }
  .medico-lista { font-size: 10px; color: var(--white-dim); margin-top: 1px; }
  .medico-obs-label { font-size: 10px; font-weight: 600; color: rgba(239,68,68,0.7); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .medico-obs { font-size: 11px; color: var(--gray-light); background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.15); border-radius: var(--radius-sm); padding: 6px 8px; line-height: 1.5; min-height: 30px; font-style: italic; }
  .medico-footer { display: flex; align-items: center; justify-content: space-between; }
  .medico-pct { font-size: 10px; color: var(--white-dim); }

  /* CHART */
  .chart-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; }
  .chart-wrap { position: relative; height: 160px; }
  .section-label { font-size: 10px; font-weight: 600; color: var(--white-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--white-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* TABLAS */
  .list-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; overflow-x: auto; }
  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .list-title { font-size: 13px; font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 8px; }
  .list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .list-count { font-size: 11px; color: var(--white-dim); background: var(--bg-base); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { padding: 8px; text-align: left; font-size: 10px; font-weight: 600; color: var(--white-dim); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
  th.center, td.center { text-align: center; }
  td { padding: 10px 8px; border-bottom: 1px solid rgba(30,45,69,0.5); color: var(--gray-light); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(59,130,246,0.04); }
  .chk-yes { color: var(--green); font-size: 15px; font-weight: 700; text-shadow: 0 0 8px rgba(16,185,129,0.5); }
  .chk-no { color: var(--gray); font-size: 12px; }

  /* BADGES */
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-ok { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .badge-warn { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
  .badge-danger { background: rgba(239,68,68,0.15); color: var(--red-bright); border: 1px solid rgba(239,68,68,0.3); }
  .badge-info { background: rgba(59,130,246,0.15); color: var(--blue-bright); border: 1px solid rgba(59,130,246,0.3); }
  .badge-neutral { background: rgba(75,85,99,0.3); color: var(--gray-light); border: 1px solid var(--gray); }
  .badge-cyan { background: rgba(6,182,212,0.15); color: var(--cyan); border: 1px solid rgba(6,182,212,0.3); }

  /* PROGRESS */
  .prog-wrap { height: 4px; background: var(--border); border-radius: 3px; margin-top: 5px; }
  .prog-fill { height: 4px; border-radius: 3px; }

  /* OBS CELL */
  .obs-cell { font-size: 11px; color: var(--white-dim); font-style: italic; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* FOOTER */
  .footer { text-align: center; font-size: 11px; color: var(--white-dim); padding-top: 1rem; opacity: 0.5; }

  @media (max-width: 600px) { body { padding: 1rem; } .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
    </div>
    <div>
      <div class="header-title">Panel Operativo</div>
      <div class="header-sub" id="header-sub">Cargando datos...</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge-live"><div class="dot-live"></div> En vivo · Trello</div>
    <button class="btn" onclick="cargarDatos()">⟳ Actualizar</button>
  </div>
</div>

<div id="error-box"><p id="error-msg"></p></div>
<div id="loading"><div class="spinner"></div>Conectando con Trello...</div>
<div id="main"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxijGk1dDAHg9aCCCDCVD3Um9rlA_qi26gycAgUXsrtbk0FM1mALQw-io5n2t3VjoB0/exec';

const LISTAS_EXCLUIDAS = ['colores de representación', 'referidos'];

const LISTAS_CONFIG = {
  tramites:   { match: t => t.lista.toUpperCase().includes('TRAMITES OPERATIVOS'), color: '#3b82f6', label: 'Trámites Operativos Chava', tieneChecklist: true },
  cierresMay: { match: t => t.lista.toUpperCase().includes('CIERRES') && t.lista.includes('05'), color: '#06b6d4', label: 'Cierres Mayo 2026', tieneChecklist: true },
  cierresJun: { match: t => t.lista.toUpperCase().includes('CIERRES') && t.lista.includes('06'), color: '#8b5cf6', label: 'Cierres Junio 2026', tieneChecklist: true },
  cobranza:   { match: t => t.lista.toUpperCase().includes('COBRANZA'), color: '#f59e0b', label: 'Cobranza Fer', tieneChecklist: false },
  atencion:   { match: t => t.lista.toUpperCase().includes('ATENCI'), color: '#10b981', label: 'Atención al Cliente', tieneChecklist: false },
  prospectos: { match: t => t.lista.toUpperCase().includes('PROSPECTO'), color: '#f97316', label: 'Prospectos de Cierre', tieneChecklist: false },
};

let chartDonut = null, datosGlobales = null;

function norm(str) {
  return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function esMedico(t) {
  return (t.labels||[]).some(l => {
    const n = norm(l.name||'');
    const c = (l.color||'').toLowerCase();
    return n.includes('medico') || c === 'red';
  });
}

function cargarDatos() {
  show('loading'); hide('main');
  document.getElementById('error-box').style.display = 'none';
  const callbackName = 'cb_' + Date.now();
  const script = document.createElement('script');
  const timeout = setTimeout(() => {
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Error: No se pudo conectar.';
    hide('loading');
    delete window[callbackName];
    if (document.body.contains(script)) document.body.removeChild(script);
  }, 12000);
  window[callbackName] = function(data) {
    clearTimeout(timeout);
    delete window[callbackName];
    if (document.body.contains(script)) document.body.removeChild(script);
    if (data.error) {
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Error: ' + data.error;
      hide('loading'); return;
    }
    datosGlobales = data;
    renderDashboard(data);
  };
  script.src = APPS_SCRIPT_URL + '?key=deltoro2026&callback=' + callbackName + '&t=' + Date.now();
  script.onerror = function() {
    clearTimeout(timeout);
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Error al cargar script.';
    hide('loading');
  };
  document.body.appendChild(script);
}

function renderDashboard(data) {
  const { tarjetas, actualizadoEn } = data;

  const tf = tarjetas.filter(t => !LISTAS_EXCLUIDAS.includes(norm(t.lista)));
  const medicas = tf.filter(t => esMedico(t));
  const normales = tf.filter(t => !esMedico(t));

  const fecha = new Date(actualizadoEn).toLocaleString('es-MX', {
    day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  document.getElementById('header-sub').textContent = `Actualizado: ${fecha}`;

  const stats = {
    enProceso:    normales.filter(t => t.pct > 0 && t.pct < 100).length,
    concluidos:   normales.filter(t => t.pct === 100).length,
    sinIniciar:   normales.filter(t => t.pct === 0).length,
    firmaUrgente: normales.filter(t => t.urgente).length,
    medicos:      medicas.length,
    vencen:       normales.filter(t => {
      if (!t.vencimiento || t.pct === 100) return false;
      return new Date(t.vencimiento) < new Date(Date.now() + 3*86400000);
    }).length
  };

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="update-info">⚡ Sincronizado el ${fecha} · N8N actualiza cada 30 min</div>
    <div class="metrics-grid" id="metrics-grid"></div>
    <div id="bloque-medico"></div>
    <div class="chart-section">
      <div class="section-label">Distribución general</div>
      <div class="legend" id="legend-donut"></div>
      <div class="chart-wrap"><canvas id="chartDonut"></canvas></div>
    </div>
    <div id="tablas-listas"></div>
    <div class="footer">Panel generado automáticamente · N8N + Trello + Google Drive</div>
  `;

  renderMetrics(stats);
  renderMedicos(medicas);
  renderDonut(normales);
  renderTablas(normales);
  hide('loading'); show('main');
}

function renderMetrics(s) {
  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric-card mc-green">
      <div class="metric-label">Concluidos</div>
      <div class="metric-val">${s.concluidos}</div>
      <div class="metric-hint">Completados al 100%</div>
    </div>
    <div class="metric-card mc-blue">
      <div class="metric-label">En proceso</div>
      <div class="metric-val">${s.enProceso}</div>
      <div class="metric-hint">Avance parcial</div>
    </div>
    <div class="metric-card mc-amber">
      <div class="metric-label">Sin iniciar</div>
      <div class="metric-val">${s.sinIniciar}</div>
      <div class="metric-hint">0% de avance</div>
    </div>
    <div class="metric-card mc-cyan">
      <div class="metric-label">Pendiente firma Sofía</div>
      <div class="metric-val">${s.firmaUrgente}</div>
      <div class="metric-hint">Cliente ya firmó</div>
    </div>
    <div class="metric-card mc-amber">
      <div class="metric-label">Vencen pronto</div>
      <div class="metric-val">${s.vencen}</div>
      <div class="metric-hint">Próximos 3 días</div>
    </div>
    ${s.medicos > 0 ? `
    <div class="metric-card mc-red">
      <div class="metric-label">Trámites médicos</div>
      <div class="metric-val">${s.medicos}</div>
      <div class="metric-hint">Requieren atención</div>
    </div>` : ''}
  `;
}

function renderMedicos(medicas) {
  const bloque = document.getElementById('bloque-medico');
  if (!medicas.length) return;

  const progColor = p => p === 100 ? '#10b981' : p >= 60 ? '#3b82f6' : '#ef4444';
  const getSemaforo = t => {
    if (t.pct === 100) return '<span class="badge badge-ok">Concluido</span>';
    if (t.urgente) return '<span class="badge badge-danger">Firma Sofía</span>';
    if (t.pct >= 50) return '<span class="badge badge-warn">En proceso</span>';
    if (t.pct > 0) return '<span class="badge badge-info">Iniciado</span>';
    return '<span class="badge badge-neutral">Sin iniciar</span>';
  };

  bloque.innerHTML = `
    <div class="medico-section" style="display:block">
      <div class="medico-header">
        <div class="medico-icon">
          <svg viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        </div>
        <div>
          <div class="medico-titulo">Trámites médicos en proceso — ${medicas.length} tarjeta${medicas.length>1?'s':''}</div>
          <div class="medico-sub">Requieren atención especial</div>
        </div>
      </div>
      <div class="medico-grid">
        ${medicas.map(t => `
          <div class="medico-card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              <div>
                <div class="medico-nombre">${t.nombre}</div>
                <div class="medico-lista">${t.lista}</div>
              </div>
              ${getSemaforo(t)}
            </div>
            <div>
              <div class="medico-obs-label">Observaciones</div>
              <div class="medico-obs">${t.desc ? t.desc.substring(0,120)+(t.desc.length>120?'…':'') : 'Sin observaciones registradas'}</div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between">
              <span style="font-size:10px;color:var(--white-dim)">${t.pct}% completado</span>
            </div>
            <div class="prog-wrap"><div class="prog-fill" style="width:${t.pct}%;background:${progColor(t.pct)}"></div></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderDonut(tarjetas) {
  const concluido  = tarjetas.filter(t => t.pct === 100).length;
  const enProceso  = tarjetas.filter(t => t.pct > 0 && t.pct < 100).length;
  const sinIniciar = tarjetas.filter(t => t.pct === 0).length;

  document.getElementById('legend-donut').innerHTML = `
    <span class="legend-item"><span class="legend-dot" style="background:#10b981"></span>Concluido (${concluido})</span>
    <span class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>En proceso (${enProceso})</span>
    <span class="legend-item"><span class="legend-dot" style="background:#374151"></span>Sin iniciar (${sinIniciar})</span>
  `;

  if (chartDonut) chartDonut.destroy();
  chartDonut = new Chart(document.getElementById('chartDonut'), {
    type: 'doughnut',
    data: {
      labels: ['Concluido','En proceso','Sin iniciar'],
      datasets: [{ data:[concluido,enProceso,sinIniciar], backgroundColor:['#10b981','#3b82f6','#374151'], borderWidth:0, hoverOffset:4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{ display:false }, tooltip:{ backgroundColor:'#1e2d45', titleColor:'#f1f5f9', bodyColor:'#9ca3af', borderColor:'#1e2d45', borderWidth:1 } },
      cutout: '70%'
    }
  });
}

function renderTablas(tarjetas) {
  const contenedor = document.getElementById('tablas-listas');
  contenedor.innerHTML = '';

  Object.entries(LISTAS_CONFIG).forEach(([key, cfg]) => {
    const cards = tarjetas.filter(t => cfg.match(t));
    if (!cards.length) return;

    const chk = v => v ? '<span class="chk-yes">✓</span>' : '<span class="chk-no">—</span>';
    const progColor = p => p === 100 ? '#10b981' : p >= 60 ? '#3b82f6' : '#f59e0b';

    const getBadge = t => {
      if (t.pct === 100) return '<span class="badge badge-ok">Concluido</span>';
      if (t.urgente) return '<span class="badge badge-danger">Firma Sofía</span>';
      if (t.checks?.enviado && !t.checks?.firmaCliente) return '<span class="badge badge-warn">Espera firma</span>';
      if (t.pct > 0) return '<span class="badge badge-info">En proceso</span>';
      return '<span class="badge badge-neutral">Sin iniciar</span>';
    };

    const getBadgeSimple = t => {
      if (t.pct === 100) return '<span class="badge badge-ok">Completada</span>';
      return '<span class="badge badge-neutral">No completada</span>';
    };

    let thead = '', tbody = '';

    if (cfg.tieneChecklist && key === 'tramites') {
      thead = `<tr>
        <th style="width:30%">Tarjeta</th>
        <th class="center">Llenado</th>
        <th class="center">Enviado</th>
        <th class="center">F. Cliente</th>
        <th class="center">F. Sofía</th>
        <th class="center">Portal</th>
        <th class="center">Estatus</th>
        <th style="width:10%">Avance</th>
      </tr>`;
      tbody = cards.map(t => `<tr>
        <td style="font-weight:500;color:var(--white)">${t.nombre}</td>
        <td class="center">${chk(t.checks?.llenado)}</td>
        <td class="center">${chk(t.checks?.enviado)}</td>
        <td class="center">${chk(t.checks?.firmaCliente)}</td>
        <td class="center">${chk(t.checks?.firmasofi)}</td>
        <td class="center">${chk(t.checks?.portal)}</td>
        <td class="center">${getBadge(t)}</td>
        <td>
          <span style="font-size:10px;color:var(--white-dim)">${t.pct}%</span>
          <div class="prog-wrap"><div class="prog-fill" style="width:${t.pct}%;background:${progColor(t.pct)}"></div></div>
        </td>
      </tr>`).join('');

    } else if (cfg.tieneChecklist) {
      thead = `<tr>
        <th style="width:30%">Tarjeta</th>
        <th class="center">Solicitud</th>
        <th class="center">F. Cliente</th>
        <th class="center">F. Sofía</th>
        <th class="center">Autorizada</th>
        <th class="center">Pagada</th>
        <th class="center">Estatus</th>
        <th style="width:10%">Avance</th>
      </tr>`;
      tbody = cards.map(t => `<tr>
        <td style="font-weight:500;color:var(--white)">${t.nombre}</td>
        <td class="center">${chk(t.checks?.solicitud)}</td>
        <td class="center">${chk(t.checks?.firmaCliente)}</td>
        <td class="center">${chk(t.checks?.firmasofi)}</td>
        <td class="center">${chk(t.checks?.autorizada)}</td>
        <td class="center">${chk(t.checks?.pagada)}</td>
        <td class="center">${getBadge(t)}</td>
        <td>
          <span style="font-size:10px;color:var(--white-dim)">${t.pct}%</span>
          <div class="prog-wrap"><div class="prog-fill" style="width:${t.pct}%;background:${progColor(t.pct)}"></div></div>
        </td>
      </tr>`).join('');

    } else {
      thead = `<tr>
        <th style="width:35%">Tarjeta</th>
        <th style="width:35%">Observaciones</th>
        <th class="center">Estatus</th>
      </tr>`;
      tbody = cards.map(t => `<tr>
        <td style="font-weight:500;color:var(--white)">${t.nombre}</td>
        <td class="obs-cell" title="${t.desc||''}">${t.desc || '<span style="font-style:italic;color:var(--gray)">Sin observaciones</span>'}</td>
        <td class="center">${getBadgeSimple(t)}</td>
      </tr>`).join('');
    }

    const section = document.createElement('div');
    section.className = 'list-section';
    section.innerHTML = `
      <div class="list-header">
        <div class="list-title">
          <span class="list-dot" style="background:${cfg.color};box-shadow:0 0 6px ${cfg.color}"></span>
          ${cfg.label}
        </div>
        <span class="list-count">${cards.length} tarjeta${cards.length>1?'s':''}</span>
      </div>
      <table>
        <thead>${thead}</thead>
        <tbody>${tbody || '<tr><td colspan="8" style="text-align:center;color:var(--white-dim);padding:2rem;">Sin tarjetas</td></tr>'}</tbody>
      </table>
    `;
    contenedor.appendChild(section);
  });
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

cargarDatos();
</script>
</body>
</html>
